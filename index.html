<!DOCTYPE html>
<html lang="zh-CN" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CDK 提取工具</title>
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* ===== shadcn CSS Variable System (HSL) ===== */
        :root {
            --background: 0 0% 100%;
            --foreground: 240 10% 3.9%;
            --card: 0 0% 100%;
            --card-foreground: 240 10% 3.9%;
            --popover: 0 0% 100%;
            --popover-foreground: 240 10% 3.9%;
            --primary: 240 5.9% 10%;
            --primary-foreground: 0 0% 98%;
            --secondary: 240 4.8% 95.9%;
            --secondary-foreground: 240 5.9% 10%;
            --muted: 240 4.8% 95.9%;
            --muted-foreground: 240 3.8% 46.1%;
            --accent: 240 4.8% 95.9%;
            --accent-foreground: 240 5.9% 10%;
            --destructive: 0 84.2% 60.2%;
            --destructive-foreground: 0 0% 98%;
            --border: 240 5.9% 90%;
            --input: 240 5.9% 90%;
            --ring: 240 5.9% 10%;
            --radius: 0.625rem;
            --success: 142 76% 36%;
            --success-foreground: 0 0% 100%;
        }

        .dark {
            --background: 240 10% 3.9%;
            --foreground: 0 0% 98%;
            --card: 240 10% 3.9%;
            --card-foreground: 0 0% 98%;
            --popover: 240 10% 3.9%;
            --popover-foreground: 0 0% 98%;
            --primary: 0 0% 98%;
            --primary-foreground: 240 5.9% 10%;
            --secondary: 240 3.7% 15.9%;
            --secondary-foreground: 0 0% 98%;
            --muted: 240 3.7% 15.9%;
            --muted-foreground: 240 5% 64.9%;
            --accent: 240 3.7% 15.9%;
            --accent-foreground: 0 0% 98%;
            --destructive: 0 62.8% 30.6%;
            --destructive-foreground: 0 0% 98%;
            --border: 240 3.7% 15.9%;
            --input: 240 3.7% 15.9%;
            --ring: 240 4.9% 83.9%;
            --success: 142 76% 36%;
            --success-foreground: 0 0% 100%;
        }

        * { box-sizing: border-box; }

        html, body {
            height: 100%;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Inter", "Noto Sans", Helvetica, Arial, sans-serif;
            background: hsl(var(--background));
            color: hsl(var(--foreground));
            line-height: 1.5;
            margin: 0;
            padding: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* ===== shadcn Components ===== */

        /* Card */
        .card {
            background: hsl(var(--card));
            border: 1px solid hsl(var(--border));
            border-radius: var(--radius);
            box-shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1), 0 1px 2px -1px rgb(0 0 0 / 0.1);
        }

        .dark .card {
            box-shadow: 0 1px 3px 0 rgb(0 0 0 / 0.3), 0 1px 2px -1px rgb(0 0 0 / 0.2);
        }

        /* Button - Primary */
        .btn-primary {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            whitespace-nowrap;
            border-radius: calc(var(--radius) - 2px);
            font-size: 0.875rem;
            font-weight: 500;
            transition: all 0.15s ease-in-out;
            background: hsl(var(--primary));
            color: hsl(var(--primary-foreground));
            padding: 0.4rem 1.1rem;
            outline: none;
            cursor: pointer;
            border: none;
            height: 2.25rem;
        }

        .btn-primary:hover:not(:disabled) {
            opacity: 0.9;
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-primary:focus-visible {
            ring: 2px solid hsl(var(--ring));
            ring-offset: 2px;
            ring-offset-color: hsl(var(--background));
        }

        /* Button - Secondary/Outline */
        .btn-secondary {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.375rem;
            whitespace-nowrap;
            border-radius: calc(var(--radius) - 2px);
            font-size: 0.75rem;
            font-weight: 500;
            transition: all 0.15s ease-in-out;
            background: transparent;
            color: hsl(var(--muted-foreground));
            border: 1px solid hsl(var(--border));
            padding: 0.25rem 0.75rem;
            outline: none;
            cursor: pointer;
            height: 1.75rem;
        }

        .btn-secondary:hover:not(:disabled) {
            background: hsl(var(--accent));
            color: hsl(var(--accent-foreground));
            border-color: hsl(var(--border));
        }

        .btn-secondary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Input */
        .input-base {
            width: 100%;
            flex: 1;
            background: hsl(var(--input));
            color: hsl(var(--foreground));
            border: 1px solid hsl(var(--input));
            border-radius: calc(var(--radius) - 2px);
            padding: 0.75rem;
            font-size: 0.875rem;
            font-family: ui-monospace, "Cascadia Code", "Consolas", monospace;
            resize: none;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .input-base:focus {
            border-color: hsl(var(--ring));
            box-shadow: 0 0 0 3px hsl(var(--ring) / 0.15);
        }

        .input-base::placeholder {
            color: hsl(var(--muted-foreground));
        }

        /* Badge */
        .badge {
            display: inline-flex;
            align-items: center;
            border-radius: 9999px;
            padding: 0.15rem 0.65rem;
            font-size: 0.75rem;
            font-weight: 500;
            transition: all 0.15s ease-in-out;
            border: 1px solid transparent;
            cursor: pointer;
            user-select: none;
        }

        .badge-default {
            background: hsl(var(--secondary));
            color: hsl(var(--secondary-foreground));
        }

        .badge-default:hover {
            background: hsl(var(--accent));
            color: hsl(var(--accent-foreground));
        }

        .badge-active {
            background: hsl(var(--foreground));
            color: hsl(var(--background));
        }

        /* Layout */
        .container {
            width: 980px;
            height: 540px;
            max-width: calc(100vw - 48px);
            max-height: calc(100vh - 48px);
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.5rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid hsl(var(--border));
            flex-shrink: 0;
        }

        header h1 {
            margin: 0;
            font-size: 1.125rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            letter-spacing: -0.025em;
        }

        header h1 svg {
            color: hsl(var(--foreground));
        }

        .main-layout {
            display: flex;
            gap: 1.5rem;
            flex: 1;
            min-height: 0;
            overflow: hidden;
            margin-top: 1rem;
        }

        .left-panel {
            width: 340px;
            min-width: 280px;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            overflow: hidden;
        }

        .right-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
            overflow: hidden;
        }

        /* Section Label */
        .section-label {
            font-size: 0.75rem;
            font-weight: 500;
            color: hsl(var(--muted-foreground));
            margin-bottom: 0.375rem;
            letter-spacing: 0.01em;
        }

        /* Upload Zone */
        .upload-zone {
            border: 1.5px dashed hsl(var(--border));
            border-radius: var(--radius);
            padding: 1.5rem 1rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
            background: hsl(var(--background));
        }

        .upload-zone:hover,
        .upload-zone:focus-within {
            border-color: hsl(var(--ring));
            background: hsl(var(--accent));
        }

        .upload-zone.dragover {
            border-color: hsl(var(--success));
            background: hsl(var(--success) / 0.06);
        }

        .upload-icon {
            width: 2.25rem;
            height: 2.25rem;
            margin: 0 auto 0.5rem;
            color: hsl(var(--muted-foreground));
            opacity: 0.7;
        }

        .upload-text {
            font-size: 0.875rem;
            color: hsl(var(--foreground));
            font-weight: 500;
        }

        .upload-hint {
            font-size: 0.75rem;
            color: hsl(var(--muted-foreground));
            margin-top: 0.25rem;
        }

        .upload-zone input[type="file"] {
            position: absolute;
            inset: 0;
            opacity: 0;
            cursor: pointer;
        }

        /* File Info */
        .file-info {
            display: none;
            align-items: center;
            gap: 0.5rem;
            padding: 0.6rem 0.875rem;
            background: hsl(var(--success) / 0.08);
            border: 1px solid hsl(var(--success) / 0.25);
            border-radius: calc(var(--radius) - 2px);
            font-size: 0.8125rem;
            animation: fadeIn 0.2s ease;
        }

        .file-info.show { display: flex; }

        .file-info .file-name {
            color: hsl(var(--success));
            font-weight: 500;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            flex: 1;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-2px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .paste-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 0;
            overflow: hidden;
        }

        /* Result Area */
        .result-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.75rem;
            flex-shrink: 0;
        }

        .result-header-left {
            display: flex;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .result-count {
            font-size: 0.875rem;
            font-weight: 600;
            color: hsl(var(--foreground));
        }

        .result-count b {
            color: hsl(var(--success));
        }

        .fmt-group {
            display: inline-flex;
            gap: 2px;
            background: hsl(var(--muted));
            border-radius: calc(var(--radius) - 2px);
            padding: 2px;
        }

        .fmt-opt input[type="radio"] { display: none; }

        .result-box {
            flex: 1;
            background: hsl(var(--background));
            border: 1px solid hsl(var(--border));
            border-radius: var(--radius);
            padding: 1rem;
            margin-top: 0.75rem;
            overflow-y: auto;
            word-break: break-all;
            white-space: pre-wrap;
            font-family: ui-monospace, "Cascadia Code", "Consolas", monospace;
            font-size: 0.8125rem;
            line-height: 1.7;
            color: hsl(var(--muted-foreground));
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .result-box.has-content {
            border-color: hsl(var(--success) / 0.5);
            color: hsl(var(--foreground));
        }

        button svg {
            fill: currentColor;
        }

        /* Theme toggle */
        .theme-toggle {
            width: 2rem;
            height: 2rem;
            border-radius: calc(var(--radius) - 2px);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border: 1px solid hsl(var(--border));
            background: transparent;
            color: hsl(var(--muted-foreground));
            cursor: pointer;
            transition: all 0.15s ease;
        }

        .theme-toggle:hover {
            background: hsl(var(--accent));
            color: hsl(var(--foreground));
        }

        .separator {
            height: 1px;
            background: hsl(var(--border));
            margin: 0.25rem 0;
        }

        @media (max-width: 768px) {
            body { padding: 12px 10px; }
            .container {
                max-width: calc(100vw - 20px);
                max-height: calc(100vh - 24px);
            }
            .main-layout { flex-direction: column; }
            .left-panel {
                width: 100%;
                min-width: 0;
                max-height: 45%;
            }
            .result-header {
                align-items: flex-start;
                flex-direction: column;
            }
        }
    </style>
</head>

<body>
    <div class="card container">
        <header>
            <h1>
                <svg width="20" height="20" viewBox="0 0 16 16" aria-hidden="true">
                    <path fill-rule="evenodd"
                        d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z" />
                </svg>
                CDK 提取工具
            </h1>
            <button class="theme-toggle" onclick="toggleTheme()" title="切换主题" aria-label="切换明暗主题">
                <svg id="theme-icon-sun" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none;">
                    <circle cx="12" cy="12" r="5"/>
                    <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
                    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
                    <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
                    <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
                </svg>
                <svg id="theme-icon-moon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>
                </svg>
            </button>
        </header>

        <div class="main-layout">
            <div class="left-panel">
                <div>
                    <div class="section-label">文件导入</div>
                    <div class="upload-zone" id="dropzone">
                        <svg class="upload-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
                            aria-hidden="true">
                            <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4" />
                            <polyline points="17 8 12 3 7 8" />
                            <line x1="12" y1="3" x2="12" y2="15" />
                        </svg>
                        <div class="upload-text">拖拽文件到此处</div>
                        <div class="upload-hint">支持 .zip / .xlsx / .xls / .csv</div>
                        <input type="file" id="file-input" accept=".zip,.xlsx,.xls,.csv" aria-label="选择文件">
                    </div>
                    <div class="file-info" id="file-info">
                        <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
                            <path d="M13.78 4.22a.75.75 0 010 1.06l-7.25 7.25a.75.75 0 01-1.06 0L2.22 9.28a.75.75 0 011.06-1.06L6 10.94l6.72-6.72a.75.75 0 011.06 0z" />
                        </svg>
                        <span class="file-name" id="loaded-filename"></span>
                        <button class="btn-secondary" style="margin-left:auto;" onclick="clearFile()">清除</button>
                    </div>
                </div>

                <div class="separator"></div>

                <div class="paste-area">
                    <div class="section-label">或直接粘贴文本</div>
                    <textarea id="input" class="input-base"
                        placeholder="粘贴包含 CDK 的文本...&#10;&#10;例如：&#10;订单号：12345&#10;CDK: ABCDE-FGHIJ-KLMNO-PQRST-UVWXY"></textarea>
                </div>
            </div>

            <div class="right-panel">
                <div class="result-header">
                    <div class="result-header-left">
                        <span class="result-count">提取到 <b id="count">0</b> 个 CDK</span>

                        <div class="fmt-group">
                            <label class="badge badge-active" onclick="setFmt(this,'comma')"><input type="radio" name="fmt"
                                    value="comma" checked> 逗号分隔</label>
                            <label class="badge badge-default" onclick="setFmt(this,'newline')"><input type="radio" name="fmt"
                                    value="newline"> 换行</label>
                        </div>
                    </div>
                    <button class="btn-primary" onclick="copyResult()" id="copy-btn" disabled>
                        <svg width="14" height="14" viewBox="0 0 16 16" aria-hidden="true">
                            <path fill-rule="evenodd"
                                d="M0 6.75C0 5.784.784 5 1.75 5h1.5a.75.75 0 010 1.5h-1.5a.25.25 0 00-.25.25v7.5c0 .138.112.25.25.25h7.5a.25.25 0 00.25-.25v-1.5a.75.75 0 011.5 0v1.5A1.75 1.75 0 019.25 16h-7.5A1.75 1.75 0 010 14.25v-7.5z" />
                            <path fill-rule="evenodd"
                                d="M5 1.75C5 .784 5.784 0 6.75 0h7.5C15.216 0 16 .784 16 1.75v7.5A1.75 1.75 0 0114.25 11h-7.5A1.75 1.75 0 015 9.25v-7.5zm1.75-.25a.25.25 0 00-.25.25v7.5c0 .138.112.25.25.25h7.5a.25.25 0 00.25-.25v-7.5a.25.25 0 00-.25-.25h-7.5z" />
                        </svg>
                        复制
                    </button>
                </div>
                <div class="result-box" id="result">等待数据输入...</div>
            </div>
        </div>
    </div>

    <script>
        let currentResult = "";
        let rawTextData = "";

        // Theme toggle
        function toggleTheme() {
            const html = document.documentElement;
            const isDark = html.classList.contains('dark');
            if (isDark) {
                html.classList.remove('dark');
                document.getElementById('theme-icon-sun').style.display = 'block';
                document.getElementById('theme-icon-moon').style.display = 'none';
            } else {
                html.classList.add('dark');
                document.getElementById('theme-icon-sun').style.display = 'none';
                document.getElementById('theme-icon-moon').style.display = 'block';
            }
        }

        function setFmt(el, val) {
            document.querySelectorAll('.fmt-opt').forEach(o => {
                o.classList.remove('badge-active');
                o.classList.add('badge-default');
            });
            document.querySelector(`input[name="fmt"][value="${val}"]`).checked = true;
            el.classList.remove('badge-default');
            el.classList.add('badge-active');
            extractCDK();
        }

        const dropzone = document.getElementById('dropzone');
        const fileInput = document.getElementById('file-input');

        dropzone.addEventListener('dragover', e => {
            e.preventDefault();
            dropzone.classList.add('dragover');
        });
        dropzone.addEventListener('dragleave', () => dropzone.classList.remove('dragover'));
        dropzone.addEventListener('drop', e => {
            e.preventDefault();
            dropzone.classList.remove('dragover');
            if (e.dataTransfer.files[0]) processFile(e.dataTransfer.files[0]);
        });
        fileInput.addEventListener('change', e => {
            if (e.target.files[0]) processFile(e.target.files[0]);
        });

        async function processFile(file) {
            const ext = file.name.split('.').pop().toLowerCase();
            if (!['zip', 'xlsx', 'xls', 'csv'].includes(ext)) {
                alert('不支持的文件类型');
                return;
            }

            try {
                let allText = "";
                if (ext === 'zip') {
                    allText = await processZip(file);
                } else {
                    allText = await readWorkbookText(file);
                }

                rawTextData = allText;
                document.getElementById('file-info').classList.add('show');
                document.getElementById('loaded-filename').textContent = `${file.name} (${formatSize(file.size)})`;
                extractCDK();
            } catch (err) {
                alert('解析失败：' + err.message);
            }
        }

        async function processZip(file) {
            const zip = await JSZip.loadAsync(await readFileAsArrayBuffer(file));
            const tableFiles = [];
            zip.forEach((path, entry) => {
                const ext = path.split('.').pop().toLowerCase();
                if (!entry.dir && ['xlsx', 'xls', 'csv'].includes(ext)) tableFiles.push(path);
            });
            if (!tableFiles.length) throw new Error('ZIP 中没有表格文件');

            const chunks = [];
            for (const path of tableFiles) {
                try {
                    const entry = zip.file(path);
                    const data = await entry.async("arraybuffer");
                    chunks.push(readWorkbookArrayBuffer(data));
                } catch (err) {
                    console.warn(`跳过无法解析的文件：${path}`, err);
                }
            }
            return chunks.join("\n");
        }

        async function readWorkbookText(file) {
            return readWorkbookArrayBuffer(await readFileAsArrayBuffer(file));
        }

        function readWorkbookArrayBuffer(buffer) {
            const wb = XLSX.read(buffer, { type: 'array' });
            return wb.SheetNames.map(name => XLSX.utils.sheet_to_csv(wb.Sheets[name])).join("\n");
        }

        function readFileAsArrayBuffer(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = e => resolve(e.target.result);
                reader.onerror = () => reject(reader.error || new Error('读取文件失败'));
                reader.readAsArrayBuffer(file);
            });
        }

        function clearFile() {
            rawTextData = "";
            fileInput.value = '';
            document.getElementById('file-info').classList.remove('show');
            extractCDK();
        }

        function formatSize(bytes) {
            if (bytes < 1024) return `${bytes} B`;
            if (bytes < 1048576) return `${(bytes / 1024).toFixed(1)} KB`;
            return `${(bytes / 1048576).toFixed(1)} MB`;
        }

        function extractCDK() {
            const text = rawTextData || document.getElementById('input').value || "";
            const matches = text.match(/\b[A-Z0-9]{5}(?:-[A-Z0-9]{5}){4}\b/gi);
            updateResult(matches || [], text.trim() === "");
        }

        function updateResult(list, empty = false) {
            const resultBox = document.getElementById('result');
            const count = document.getElementById('count');
            const copyButton = document.getElementById('copy-btn');
            const fmt = document.querySelector('input[name="fmt"]:checked').value;

            if (!empty && list.length) {
                const uniqueList = [...new Set(list.map(item => item.toUpperCase()))];
                currentResult = fmt === 'comma' ? uniqueList.join(',') : uniqueList.join('\n');
                resultBox.textContent = currentResult;
                resultBox.classList.add('has-content');
                count.textContent = uniqueList.length;
                copyButton.disabled = false;
                return;
            }

            currentResult = "";
            resultBox.textContent = empty ? "等待数据输入..." : "未找到符合条件的 CDK";
            resultBox.classList.remove('has-content');
            count.textContent = "0";
            copyButton.disabled = true;
        }

        function copyResult() {
            if (!currentResult) return;

            navigator.clipboard.writeText(currentResult).then(() => {
                const button = document.getElementById('copy-btn');
                const originalHTML = button.innerHTML;
                button.innerHTML = `<svg width="14" height="14" viewBox="0 0 16 16"><path fill-rule="evenodd" d="M13.78 4.22a.75.75 0 010 1.06l-7.25 7.25a.75.75 0 01-1.06 0L2.22 9.28a.75.75 0 011.06-1.06L6 10.94l6.72-6.72a.75.75 0 011.06 0z"/></svg> 已复制`;
                setTimeout(() => button.innerHTML = originalHTML, 2000);
            }).catch(() => alert('复制失败'));
        }

        document.getElementById('input').addEventListener('input', () => {
            rawTextData = '';
            document.getElementById('file-info').classList.remove('show');
            fileInput.value = '';
            extractCDK();
        });
    </script>
</body>

</html>
